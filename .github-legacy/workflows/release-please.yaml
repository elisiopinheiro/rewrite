name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: 4wm-internal
    steps:
      - name: Generate a token
        id: gen-gh-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_4WM_CI_APP_ID }}
          private-key: ${{ secrets.GH_SSH_KEY_4WM_CI }}
          owner: 4WHEELS-M
          skip-token-revoke: 'true'

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.gen-gh-token.outputs.token }}
