name: 'Lint PR'

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  main:
    name: Validate PR title
    runs-on: 4wm-internal
    permissions:
      pull-requests: read
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
