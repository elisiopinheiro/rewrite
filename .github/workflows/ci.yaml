name: CI

on:
  push:
    branches: [main, clean-rewrite]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Lint (ruff)
        run: |
          uv run ruff check src tests migrations
          uv run ruff format --check src tests migrations

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Tests
        run: uv run pytest

      - name: OpenAPI spec is up to date
        run: |
          PYTHONPATH=src uv run python scripts/generate_openapi_spec.py
          git diff --exit-code openapi.json \
            || (echo "::error::openapi.json is stale — run scripts/generate_openapi_spec.py and commit." && exit 1)
