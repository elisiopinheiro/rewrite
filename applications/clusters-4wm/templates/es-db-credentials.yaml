apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "clusters-4wm.fullname" . }}-db-credentials
spec:
  refreshInterval: 10m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "clusters-4wm.fullname" . }}-db-credentials
  data:
  - secretKey: password
    remoteRef:
      key: applications/clusters-4wm-{{ .Values.environment }}/database
      property: password
  - secretKey: username
    remoteRef:
      key: applications/clusters-4wm-{{ .Values.environment }}/database
      property: username
