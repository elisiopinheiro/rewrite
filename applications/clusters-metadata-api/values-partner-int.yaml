environment: int

image:
  repository: 845910084933.dkr.ecr.eu-central-1.amazonaws.com/clusters-metadata-api

ingress:
  enabled: true
  certManagerEnabled: true
  hosts:
    - host: clusters-metadata-api-scp-int.apps.4wm-shared-services-int.eu-central-1.aws.cloud.bmw
      paths:
        - path: /
          pathType: ImplementationSpecific
    - host: clusters-metadata-api-partner-int.apps.4wm-shared-services-int.eu-central-1.aws.cloud.bmw
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: tls
      hosts:
        - clusters-metadata-api-scp-int.apps.4wm-shared-services-int.eu-central-1.aws.cloud.bmw
        - clusters-metadata-api-partner-int.apps.4wm-shared-services-int.eu-central-1.aws.cloud.bmw

database:
  # Shared with the legacy clusters-4wm service during coexistence — must point
  # at the SAME physical RDS instance the legacy app uses.
  host: clusters-4wm-int-master.calxwmhjhlhu.eu-central-1.rds.amazonaws.com
