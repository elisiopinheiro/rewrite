nameOverride:
fullnameOverride:

environment:

replicas: 2

image:
  repository:
  tag:
  pullPolicy: Always
  pullSecret: aws-registry

api:
  command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  vault_credentials:
  - secretName: api-credentials
    path: "applications/clusters-metadata-api-{{ .Values.environment }}/api"
    properties:
    - secretKey: "BASIC_API_USERNAME"
      property: "username"
    - secretKey: "BASIC_API_PASSWORD"
      property: "password"
  - secretName: backfill-credentials
    path: "applications/clusters-metadata-api-{{ .Values.environment }}/api"
    properties:
    - secretKey: "BASIC_BACKFILL_USERNAME"
      property: "backfill-username"
    - secretKey: "BASIC_BACKFILL_PASSWORD"
      property: "backfill-password"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 200m
    memory: 768Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

serviceMonitor:
  enabled: true
  additionalLabels: {}
  ## The label to use to retrieve the job name from.
  ## jobLabel: "app.kubernetes.io/name"
  namespace: ""
  namespaceSelector: {}
  ## Default: scrape .Release.Namespace only
  ## To scrape all, use the following:
  ## namespaceSelector:
  ##   any: true
  scrapeInterval: 30s
  # honorLabels: true
  targetLabels: []
  relabelings: []
  metricRelabelings: []

ingress:
  enabled: false
  className: "private-f5"
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    []
    # - host: clusters-metadata-api-int.apps.4wm-services.eu-central-1.aws.cloud.bmw
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

initDb:
  enabled: true
  command:
    - "sh"
    - "-c"
    - "python -m alembic upgrade head"

database:
  external: true
  host:
  name: clusters4wm

namespaces:
  adgr_group_regex: '^(APPL_|RN-|RN_).*$'
