services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clusters
      POSTGRES_USER: cluster_app
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cluster_app -d clusters"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot schema bootstrap: builds the schema on a fresh DB, no-op otherwise.
  migrate:
    image: clusters-metadata-api:local
    build:
      context: .
      target: runtime
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

  api:
    image: clusters-metadata-api:local
    build:
      context: .
      target: runtime
    init: true
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      APP_ENVIRONMENT: dev
      WATCHFILES_FORCE_POLLING: "true"
    # Live-reload from the bind-mounted source (overrides the image's default command).
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --app-dir=/app/src
      - --reload-dir=/app/src
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - venv:/app/.venv

  partner:
    image: clusters-metadata-api:local
    build:
      context: .
      target: runtime
    init: true
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      APP_ENVIRONMENT: dev
      WATCHFILES_FORCE_POLLING: "true"
    command:
      - python
      - -m
      - uvicorn
      - app.partner:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --app-dir=/app/src
      - --reload-dir=/app/src
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - venv:/app/.venv

volumes:
  pgdata:
  venv:
