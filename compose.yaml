services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clusters
      POSTGRES_USER: cluster_app
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cluster_app -d clusters"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: m4w-dev
    init: true
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    environment:
      DB_HOST: db
      APP_ENVIRONMENT: dev
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - api-venv:/app/.venv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  partner:
    build:
      context: .
      target: partner-dev
    init: true
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    environment:
      DB_HOST: db
      APP_ENVIRONMENT: dev
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - partner-venv:/app/.venv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  api-venv:
  partner-venv:
